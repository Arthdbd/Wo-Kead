
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmila · Галерея</title>
    <link rel="icon" href="https://arthdbd.github.io/Wo-Kead/Ico-removebg-preview.png" type="image/png">
    <style>
        html, body {
            margin: 0;
            padding: 20;
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://arthdbd.github.io/Wo-Kead/Farmila/Gallery_back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            text-align: center;
            color: #dce4ee;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            max-width: 1650px;
            width: 100%;
        }
        .image-container {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 5px;
            display: inline-block;
        }
        .gallery img {
            width: 100%;
            max-width: 400px;
            height: auto;
            cursor: pointer;
            border: 2px solid #3e3e43;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }
        .gallery img:hover {
            border-color: #00af92;
            transform: scale(1.1);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            position: relative;
            max-width: 85vw;
            max-height: 85vh;
            cursor: pointer;
        }
        .modal img {
            max-width: 85vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            display: block;
            cursor: pointer;
        }
        /* Зоны для клика (невидимые, узкие у краев) */
        .nav-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 12%;
            cursor: pointer;
            z-index: 1010;
            background: transparent;
        }
        .nav-zone-left {
            left: 0;
        }
        .nav-zone-right {
            right: 0;
        }
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            pointer-events: none;
        }
        .nav-zone-left .nav-arrow {
            left: 15px;
        }
        .nav-zone-right .nav-arrow {
            right: 15px;
        }
        .nav-zone:hover .nav-arrow {
            color: #00af92;
            transform: translateY(-50%) scale(1.2);
        }
        .photo-counter {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 1010;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .nav-zone {
                width: 15%;
            }
            .nav-arrow {
                font-size: 32px;
            }
            .nav-zone-left .nav-arrow {
                left: 8px;
            }
            .nav-zone-right .nav-arrow {
                right: 8px;
            }
            .photo-counter {
                bottom: 12%;
                font-size: 12px;
                padding: 4px 12px;
            }
        }
        @media (max-height: 600px) {
            .photo-counter {
                bottom: 8%;
            }
        }
    </style>
</head>
<body>
    <h1>Мероприятия</h1>
    <div class="gallery">
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-04-08/Мероприятия/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.20.23.09.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.20.23.09.png" data-index="0"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-04-08/Мероприятия/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.10.19.57.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.10.19.57.png" data-index="1"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-04-08/Мероприятия/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.00.29.02.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.00.29.02.png" data-index="2"></div>
    </div>
    <div id="modal" class="modal">
        <div class="nav-zone nav-zone-left" id="prevZone">
            <div class="nav-arrow">‹</div>
        </div>
        <div class="modal-content" id="modalContent">
            <img id="modal-image" alt="Preview">
        </div>
        <div class="nav-zone nav-zone-right" id="nextZone">
            <div class="nav-arrow">›</div>
        </div>
        <div class="photo-counter" id="photoCounter"></div>
    </div>

    <script>
        // Данные из Python
        var images = ["https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-04-08/\u041c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.20.23.09.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-04-08/\u041c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.10.19.57.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-04-08/\u041c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.04.08_-_00.00.29.02.png"];
        var currentIndex = 0;
        var modal = document.getElementById('modal');
        var modalImage = document.getElementById('modal-image');
        var modalContent = document.getElementById('modalContent');
        var prevZone = document.getElementById('prevZone');
        var nextZone = document.getElementById('nextZone');
        var photoCounter = document.getElementById('photoCounter');
        
        function updateCounter() {
            photoCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
        }
        
        function openModal(index) {
            if (images.length === 0) return;
            currentIndex = index;
            modalImage.src = images[currentIndex];
            modal.style.display = 'flex';
            updateCounter();
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        function nextImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex + 1) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        function prevImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        // Назначаем обработчики на изображения в галерее
        var imgs = document.querySelectorAll('.gallery img');
        for (var i = 0; i < imgs.length; i++) {
            (function(idx) {
                imgs[idx].addEventListener('click', function() {
                    openModal(idx);
                });
            })(i);
        }
        
        // Закрытие по клику на изображение (как в Google)
        modalImage.addEventListener('click', function(e) {
            e.stopPropagation();
            closeModal();
        });
        
        // Закрытие по клику на фон (но не на зоны стрелок)
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Клик по зонам стрелок
        prevZone.addEventListener('click', function(e) {
            e.stopPropagation();
            prevImage();
        });
        
        nextZone.addEventListener('click', function(e) {
            e.stopPropagation();
            nextImage();
        });
        
        // Управление с клавиатуры
        document.addEventListener('keydown', function(e) {
            if (modal.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeModal();
            }
        });
        
        if (images.length === 0) {
            prevZone.style.display = 'none';
            nextZone.style.display = 'none';
        }
    </script>
</body>
</html>
