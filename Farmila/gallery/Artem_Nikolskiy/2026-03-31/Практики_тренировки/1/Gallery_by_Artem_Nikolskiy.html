
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmila Image Gallery</title>
    <link rel="icon" href="https://arthdbd.github.io/Wo-Kead/Ico-removebg-preview.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://arthdbd.github.io/Wo-Kead/Farmila/Gallery_back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.55);
            background-blend-mode: darken;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(1, 231, 202, 0.5);
        }
        
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 150px);
        }
        
        .gallery::-webkit-scrollbar {
            width: 8px;
        }
        
        .gallery::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        
        .gallery::-webkit-scrollbar-thumb {
            background: #01e7ca;
            border-radius: 10px;
        }
        
        .image-container {
            background: rgba(1, 231, 202, 0.1);
            border-radius: 16px;
            padding: 8px;
            transition: all 0.3s ease;
            border: 1px solid rgba(1, 231, 202, 0.3);
        }
        
        .image-container:hover {
            border-color: #01e7ca;
            box-shadow: 0 0 20px rgba(1, 231, 202, 0.3);
        }
        
        .gallery img {
            width: 100%;
            max-width: 280px;
            height: auto;
            cursor: pointer;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
            border: 2px solid rgba(1, 231, 202, 0.5);
        }
        
        .gallery img:hover {
            border-color: #01e7ca;
            transform: scale(1.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(1, 231, 202, 0.3);
            border: 2px solid rgba(1, 231, 202, 0.5);
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(1, 231, 202, 0.2);
            color: white;
            font-size: 48px;
            cursor: pointer;
            padding: 20px 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
            z-index: 1010;
            border: 1px solid rgba(1, 231, 202, 0.4);
            font-weight: 300;
            user-select: none;
        }
        
        .nav-arrow:hover {
            background: rgba(1, 231, 202, 0.4);
            transform: translateY(-50%) scale(1.1);
            border-color: #01e7ca;
        }
        
        .prev-arrow {
            left: 30px;
        }
        
        .next-arrow {
            right: 30px;
        }
        
        .photo-counter {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 40px;
            color: #01e7ca;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 1010;
            border: 1px solid rgba(1, 231, 202, 0.4);
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 1010;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            .nav-arrow {
                font-size: 32px;
                padding: 12px 10px;
            }
            .prev-arrow {
                left: 10px;
            }
            .next-arrow {
                right: 10px;
            }
            .photo-counter {
                bottom: 15px;
                font-size: 12px;
                padding: 5px 15px;
            }
            h1 {
                font-size: 24px;
                margin-bottom: 15px;
            }
            .gallery img {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>
    <h1>Практики/тренировки</h1>
    <div class="gallery" id="gallery"></div>
    
    <div id="modal" class="modal">
        <div class="nav-arrow prev-arrow" id="prevBtn">‹</div>
        <div class="modal-content">
            <img id="modal-image" alt="Preview">
        </div>
        <div class="nav-arrow next-arrow" id="nextBtn">›</div>
        <div class="photo-counter" id="photoCounter"></div>
        <div class="controls-hint">← →  |  Esc</div>
    </div>

    <script>
        // Данные из Python
        var imageUrls = ["https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u041f\u0440\u0430\u043a\u0442\u0438\u043a\u0438_\u0442\u0440\u0435\u043d\u0438\u0440\u043e\u0432\u043a\u0438/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_14.36.02.84.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u041f\u0440\u0430\u043a\u0442\u0438\u043a\u0438_\u0442\u0440\u0435\u043d\u0438\u0440\u043e\u0432\u043a\u0438/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_00.20.22.48.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u041f\u0440\u0430\u043a\u0442\u0438\u043a\u0438_\u0442\u0440\u0435\u043d\u0438\u0440\u043e\u0432\u043a\u0438/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.30.10.36.png"];
        var categoryName = "Практики/тренировки";
        
        var currentIndex = 0;
        var imagesCount = imageUrls.length;
        
        var gallery = document.getElementById('gallery');
        var modal = document.getElementById('modal');
        var modalImage = document.getElementById('modal-image');
        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var photoCounter = document.getElementById('photoCounter');
        var galleryTitle = document.querySelector('h1');
        
        galleryTitle.textContent = categoryName;
        
        function updateCounter() {
            if (imagesCount > 0) {
                photoCounter.textContent = (currentIndex + 1) + " / " + imagesCount;
            } else {
                photoCounter.textContent = "0 / 0";
            }
        }
        
        function loadGallery() {
            if (!gallery) return;
            gallery.innerHTML = '';
            
            if (imageUrls.length === 0) {
                var emptyMsg = document.createElement('div');
                emptyMsg.textContent = 'Нет изображений для отображения';
                emptyMsg.style.color = 'white';
                emptyMsg.style.padding = '40px';
                emptyMsg.style.textAlign = 'center';
                gallery.appendChild(emptyMsg);
                return;
            }
            
            for (var i = 0; i < imageUrls.length; i++) {
                var url = imageUrls[i];
                if (!url) continue;
                
                var container = document.createElement('div');
                container.className = 'image-container';
                
                var img = document.createElement('img');
                img.src = url;
                img.alt = 'Image ' + (i + 1);
                
                (function(index) {
                    img.onclick = function() { openModal(index); };
                })(i);
                
                container.appendChild(img);
                gallery.appendChild(container);
            }
        }
        
        function openModal(index) {
            if (imagesCount === 0) return;
            
            if (index < 0) index = 0;
            if (index >= imagesCount) index = imagesCount - 1;
            
            currentIndex = index;
            updateModalImage();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        function updateModalImage() {
            if (imagesCount === 0) {
                modalImage.src = '';
                updateCounter();
                return;
            }
            
            if (imageUrls[currentIndex]) {
                modalImage.src = imageUrls[currentIndex];
                updateCounter();
            }
        }
        
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        function nextImage() {
            if (imagesCount === 0) return;
            currentIndex = (currentIndex + 1) % imagesCount;
            updateModalImage();
        }
        
        function prevImage() {
            if (imagesCount === 0) return;
            currentIndex = (currentIndex - 1 + imagesCount) % imagesCount;
            updateModalImage();
        }
        
        modal.addEventListener('click', function(event) {
            if (event.target === modal) {
                closeModal();
            }
        });
        
        prevBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            prevImage();
        });
        
        nextBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            nextImage();
        });
        
        document.addEventListener('keydown', function(e) {
            if (modal.style.display !== 'flex') return;
            
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeModal();
            }
        });
        
        imagesCount = imageUrls.length;
        loadGallery();
        
        if (imagesCount === 0) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        }
    </script>
</body>
</html>
