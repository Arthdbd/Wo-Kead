
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmila · Галерея</title>
    <link rel="icon" href="https://arthdbd.github.io/Wo-Kead/Ico-removebg-preview.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://arthdbd.github.io/Wo-Kead/Farmila/Gallery_back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        h1 {
            text-align: center;
            color: #dce4ee;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            max-width: 1650px;
            width: 100%;
        }
        
        .image-container {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 5px;
            display: inline-block;
        }
        
        .gallery img {
            width: 100%;
            max-width: 400px;
            height: auto;
            cursor: pointer;
            border: 2px solid #3e3e43;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }
        
        .gallery img:hover {
            border-color: #00af92;
            transform: scale(1.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .modal img {
            max-width: 85vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        /* Зоны для клика (узкие у краев, только на бока картинки) */
        .nav-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 15%;
            cursor: pointer;
            z-index: 1010;
            background: transparent;
        }
        
        .nav-zone-left {
            left: 0;
        }
        
        .nav-zone-right {
            right: 0;
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            pointer-events: none;
            opacity: 0.6;
        }
        
        .nav-zone-left .nav-arrow {
            left: 20px;
        }
        
        .nav-zone-right .nav-arrow {
            right: 20px;
        }
        
        .nav-zone:hover .nav-arrow {
            opacity: 1;
            color: #00af92;
            transform: translateY(-50%) scale(1.1);
        }
        
        .photo-counter {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 1010;
            pointer-events: none;
            white-space: nowrap;
        }
        
        .zoom-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 1010;
            pointer-events: none;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            .nav-zone {
                width: 18%;
            }
            .nav-arrow {
                font-size: 36px;
            }
            .nav-zone-left .nav-arrow {
                left: 10px;
            }
            .nav-zone-right .nav-arrow {
                right: 10px;
            }
            .photo-counter {
                bottom: 12%;
                font-size: 12px;
                padding: 4px 12px;
            }
            .zoom-hint {
                bottom: 10px;
                right: 10px;
                font-size: 10px;
            }
        }
        
        @media (max-height: 600px) {
            .photo-counter {
                bottom: 8%;
            }
            .modal img {
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>
    <h1>Активные вызовы</h1>
    <div class="gallery">
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/4/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.23.00.26.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.23.00.26.png" data-index="0"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/4/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.24.53.97.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.24.53.97.png" data-index="1"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/4/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.26.32.88.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.26.32.88.png" data-index="2"></div>
    </div>
    <div id="modal" class="modal">
        <div class="nav-zone nav-zone-left" id="prevZone">
            <div class="nav-arrow">‹</div>
        </div>
        <div class="modal-content" id="modalContent">
            <img id="modal-image" alt="Preview">
        </div>
        <div class="nav-zone nav-zone-right" id="nextZone">
            <div class="nav-arrow">›</div>
        </div>
        <div class="photo-counter" id="photoCounter"></div>
        <div class="zoom-hint">Ctrl + колесико для масштаба</div>
    </div>

    <script>
        // Данные из Python
        var images = ["https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/4/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.23.00.26.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/4/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.24.53.97.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/4/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.26_-_13.26.32.88.png"];
        var currentIndex = 0;
        var modal = document.getElementById('modal');
        var modalImage = document.getElementById('modal-image');
        var modalContent = document.getElementById('modalContent');
        var prevZone = document.getElementById('prevZone');
        var nextZone = document.getElementById('nextZone');
        var photoCounter = document.getElementById('photoCounter');
        
        // Переменные для зума
        var currentZoom = 1;
        var isZoomed = false;
        
        function updateCounter() {
            photoCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
        }
        
        function resetZoom() {
            currentZoom = 1;
            isZoomed = false;
            modalImage.style.transform = 'scale(1)';
            modalImage.style.transition = 'transform 0.2s ease';
        }
        
        function openModal(index) {
            if (images.length === 0) return;
            resetZoom();
            currentIndex = index;
            modalImage.src = images[currentIndex];
            modal.style.display = 'flex';
            updateCounter();
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.style.display = 'none';
            resetZoom();
            document.body.style.overflow = '';
        }
        
        function nextImage() {
            if (images.length === 0) return;
            resetZoom();
            currentIndex = (currentIndex + 1) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        function prevImage() {
            if (images.length === 0) return;
            resetZoom();
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        // Зум по Ctrl + колесико
        modalImage.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
                var delta = e.deltaY > 0 ? -0.1 : 0.1;
                var newZoom = currentZoom + delta;
                if (newZoom >= 0.5 && newZoom <= 3) {
                    currentZoom = newZoom;
                    modalImage.style.transform = 'scale(' + currentZoom + ')';
                    modalImage.style.transition = 'transform 0.1s ease';
                    isZoomed = currentZoom !== 1;
                }
            }
        });
        
        // Закрытие по клику на изображение (как в Google)
        modalImage.addEventListener('click', function(e) {
            e.stopPropagation();
            closeModal();
        });
        
        // Закрытие по клику на фон (но не на зоны стрелок)
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Клик по зонам стрелок
        prevZone.addEventListener('click', function(e) {
            e.stopPropagation();
            prevImage();
        });
        
        nextZone.addEventListener('click', function(e) {
            e.stopPropagation();
            nextImage();
        });
        
        // Управление с клавиатуры
        document.addEventListener('keydown', function(e) {
            if (modal.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeModal();
            }
        });
        
        // Назначаем обработчики на изображения в галерее
        var imgs = document.querySelectorAll('.gallery img');
        for (var i = 0; i < imgs.length; i++) {
            (function(idx) {
                imgs[idx].addEventListener('click', function() {
                    openModal(idx);
                });
            })(i);
        }
        
        if (images.length === 0) {
            prevZone.style.display = 'none';
            nextZone.style.display = 'none';
        }
    </script>
</body>
</html>
