
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmila Image</title>
    <link rel="icon" href="https://arthdbd.github.io/Wo-Kead/Ico-removebg-preview.png" type="image/png">
    <style>
        html, body {
            margin: 0;
            padding: 20;
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://arthdbd.github.io/Wo-Kead/Farmila/Gallery_back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            text-align: center;
            color: #dce4ee;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            max-width: 1650px;
            width: 100%;
        }
        .image-container {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 5px;
            display: inline-block;
        }
        .gallery img {
            width: 100%;
            max-width: 400px;
            height: auto;
            cursor: pointer;
            border: 2px solid #3e3e43;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }
        .gallery img:hover {
            border-color: #00af92;
            transform: scale(1.1);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            position: relative;
            max-width: 85vw;
            max-height: 85vh;
        }
        .modal img {
            max-width: 85vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            margin-top: -30px;
        }
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 48px;
            cursor: pointer;
            z-index: 1010;
            user-select: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        .nav-arrow:hover {
            color: #00af92;
            transform: translateY(-50%) scale(1.2);
        }
        .prev-arrow {
            left: 20px;
        }
        .next-arrow {
            right: 20px;
        }
        .photo-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            z-index: 1010;
        }
        @media (max-width: 768px) {
            .nav-arrow {
                font-size: 36px;
            }
            .prev-arrow {
                left: 10px;
            }
            .next-arrow {
                right: 10px;
            }
            .modal img {
                margin-top: -20px;
            }
        }
    </style>
</head>
<body>
    <h1>Активные вызовы</h1>
    <div class="gallery">
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.13.19.09.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.13.19.09.png" data-index="0"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.16.23.60.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.16.23.60.png" data-index="1"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.17.14.09.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.17.14.09.png" data-index="2"></div>
    </div>
    <div id="modal" class="modal">
        <div class="nav-arrow prev-arrow" id="prevBtn">‹</div>
        <div class="modal-content">
            <img id="modal-image" alt="Preview">
        </div>
        <div class="nav-arrow next-arrow" id="nextBtn">›</div>
        <div class="photo-counter" id="photoCounter"></div>
    </div>

    <script>
        // Данные из Python
        var images = ["https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.13.19.09.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.16.23.60.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/1/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.28_-_15.17.14.09.png"];
        var currentIndex = 0;
        var modal = document.getElementById('modal');
        var modalImage = document.getElementById('modal-image');
        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var photoCounter = document.getElementById('photoCounter');
        
        function updateCounter() {
            photoCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
        }
        
        function openModal(index) {
            if (images.length === 0) return;
            currentIndex = index;
            modalImage.src = images[currentIndex];
            modal.style.display = 'flex';
            updateCounter();
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        function nextImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex + 1) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        function prevImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        // Назначаем обработчики на изображения
        var imgs = document.querySelectorAll('.gallery img');
        for (var i = 0; i < imgs.length; i++) {
            (function(idx) {
                imgs[idx].addEventListener('click', function() {
                    openModal(idx);
                });
            })(i);
        }
        
        // Закрытие по клику на фон
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Стрелки на экране
        prevBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            prevImage();
        });
        
        nextBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            nextImage();
        });
        
        // Управление с клавиатуры
        document.addEventListener('keydown', function(e) {
            if (modal.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeModal();
            }
        });
        
        if (images.length === 0) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        }
    </script>
</body>
</html>
