
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmila · Галерея</title>
    <link rel="icon" href="https://arthdbd.github.io/Wo-Kead/Ico-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 20% 30%, #03312b, #010a09 90%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        
        /* Бирюзовые размытые фигуры */
        body::before {
            content: '';
            position: fixed;
            width: 70vmax;
            height: 70vmax;
            top: 5vh;
            left: -15vw;
            background: rgba(1, 231, 202, 0.2);
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            animation: floatBlob 25s infinite alternate ease-in-out;
        }
        
        body::after {
            content: '';
            position: fixed;
            width: 60vmin;
            height: 60vmin;
            bottom: 0;
            right: 0;
            background: rgba(1, 231, 202, 0.15);
            border-radius: 50%;
            filter: blur(150px);
            z-index: 0;
            animation: floatBlob 20s infinite alternate-reverse ease-in-out;
        }
        
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-5%, -8%) scale(1.3); opacity: 0.6; }
        }
        
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #5effe8, #01e7ca);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(1, 231, 202, 0.5);
            z-index: 10;
        }
        
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 150px);
            z-index: 10;
        }
        
        .gallery::-webkit-scrollbar {
            width: 8px;
        }
        
        .gallery::-webkit-scrollbar-track {
            background: rgba(1, 231, 202, 0.1);
            border-radius: 10px;
        }
        
        .gallery::-webkit-scrollbar-thumb {
            background: #01e7ca;
            border-radius: 10px;
        }
        
        .image-container {
            background: rgba(1, 231, 202, 0.1);
            border-radius: 20px;
            padding: 8px;
            transition: all 0.3s ease;
            border: 1px solid rgba(1, 231, 202, 0.3);
            backdrop-filter: blur(8px);
        }
        
        .image-container:hover {
            border-color: #01e7ca;
            box-shadow: 0 0 20px rgba(1, 231, 202, 0.3);
            transform: translateY(-4px);
        }
        
        .gallery img {
            width: 100%;
            max-width: 280px;
            height: auto;
            cursor: pointer;
            border-radius: 16px;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
            border: none;
        }
        
        .gallery img:hover {
            transform: scale(1.02);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        
        .modal img {
            max-width: 85vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(1, 231, 202, 0.3);
            border: 2px solid rgba(1, 231, 202, 0.5);
        }
        
        /* Зоны для клика (невидимые, но на всю высоту) */
        .nav-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 20%;
            cursor: pointer;
            z-index: 2010;
            background: transparent;
        }
        
        .nav-zone-left {
            left: 0;
        }
        
        .nav-zone-right {
            right: 0;
        }
        
        .nav-zone-left:hover .nav-arrow-left,
        .nav-zone-right:hover .nav-arrow-right {
            opacity: 1;
        }
        
        .nav-arrow-left,
        .nav-arrow-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 56px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            opacity: 0.5;
            z-index: 2015;
        }
        
        .nav-arrow-left {
            left: 40px;
        }
        
        .nav-arrow-right {
            right: 40px;
        }
        
        .nav-arrow-left:hover,
        .nav-arrow-right:hover {
            color: #01e7ca;
            transform: translateY(-50%) scale(1.1);
            opacity: 1;
        }
        
        .photo-counter {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            color: #01e7ca;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 2020;
            border: 1px solid rgba(1, 231, 202, 0.3);
        }
        
        @media (max-width: 768px) {
            .nav-arrow-left,
            .nav-arrow-right {
                font-size: 40px;
            }
            .nav-arrow-left {
                left: 15px;
            }
            .nav-arrow-right {
                right: 15px;
            }
            .photo-counter {
                bottom: 15px;
                font-size: 12px;
                padding: 4px 12px;
            }
            h1 {
                font-size: 24px;
                margin-bottom: 15px;
            }
            .gallery img {
                max-width: 160px;
            }
            .nav-zone {
                width: 25%;
            }
        }
    </style>
</head>
<body>
    <h1>Активные вызовы</h1>
    <div class="gallery">
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/2/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.46.23.00.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.46.23.00.png" data-index="0"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/2/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.47.16.23.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.47.16.23.png" data-index="1"></div>
        <div class="image-container"><img src="https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/Активные_вызовы/2/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.47.53.33.png" alt="Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.47.53.33.png" data-index="2"></div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="nav-zone nav-zone-left" id="prevZone">
                <div class="nav-arrow-left">‹</div>
            </div>
            <img id="modal-image" alt="Preview">
            <div class="nav-zone nav-zone-right" id="nextZone">
                <div class="nav-arrow-right">›</div>
            </div>
        </div>
        <div class="photo-counter" id="photoCounter"></div>
    </div>

    <script>
        // Данные из Python
        var images = ["https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/2/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.46.23.00.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/2/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.47.16.23.png", "https://arthdbd.github.io/Wo-Kead/Farmila/gallery/Artem_Nikolskiy/2026-03-31/\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0435_\u0432\u044b\u0437\u043e\u0432\u044b/2/Grand_Theft_Auto__San_Andreas_Screenshot_2026.03.27_-_17.47.53.33.png"];
        var currentIndex = 0;
        var modal = document.getElementById('modal');
        var modalImage = document.getElementById('modal-image');
        var prevZone = document.getElementById('prevZone');
        var nextZone = document.getElementById('nextZone');
        var photoCounter = document.getElementById('photoCounter');
        
        function updateCounter() {
            photoCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
        }
        
        function openModal(index) {
            if (images.length === 0) return;
            currentIndex = index;
            modalImage.src = images[currentIndex];
            modal.style.display = 'flex';
            updateCounter();
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        function nextImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex + 1) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        function prevImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            modalImage.src = images[currentIndex];
            updateCounter();
        }
        
        // Назначаем обработчики на изображения в галерее
        var imgs = document.querySelectorAll('.gallery img');
        for (var i = 0; i < imgs.length; i++) {
            (function(idx) {
                imgs[idx].addEventListener('click', function() {
                    openModal(idx);
                });
            })(i);
        }
        
        // Закрытие по клику на фон (но не на стрелки)
        modal.addEventListener('click', function(e) {
            if (e.target === modal || e.target === modalImage) {
                closeModal();
            }
        });
        
        // Клик по зонам стрелок
        prevZone.addEventListener('click', function(e) {
            e.stopPropagation();
            prevImage();
        });
        
        nextZone.addEventListener('click', function(e) {
            e.stopPropagation();
            nextImage();
        });
        
        // Управление с клавиатуры
        document.addEventListener('keydown', function(e) {
            if (modal.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeModal();
            }
        });
        
        if (images.length === 0) {
            prevZone.style.display = 'none';
            nextZone.style.display = 'none';
        }
    </script>
</body>
</html>
